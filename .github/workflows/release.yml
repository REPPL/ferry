name: release

# Pushing a version tag (vX.Y.Z) first re-runs the full verification gate
# (build, vet, tests including the race leg, and the behavioural eval suite
# against a real Linux binary) against the PUSHED COMMIT; only if that gate is
# green does it build the four cross-compiled binaries FROM THAT SAME COMMIT,
# generate a checksums.txt manifest over them, and publish a GitHub Release with
# the binaries, checksums.txt, and their build-provenance attestations attached.
# Nothing is pushed to any branch: install.sh fetches checksums.txt from the
# release at install time, so no checksum is ever committed back. Both jobs check
# out `github.sha` — the commit the pushed tag pointed at, fixed for the whole run
# — never the tag NAME, which could be force-re-pointed between the jobs to swap
# unverified code into the release build. Net effect: a tag push produces a
# verified, ready-to-install release whose binaries, checksums, and reported
# version all come from the pushed commit — never the default-branch tip, never a
# moved tag.
on:
  push:
    tags:
      - 'v*'

# Never run two releases of the same tag concurrently, and never cancel a
# release mid-flight — a half-published release is worse than a queued one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Floor for the workflow: read-only. The release job below elevates itself to
# contents: write only to create the Release and upload its assets; verify stays
# read-only. No job pushes to any branch.
permissions:
  contents: read

jobs:
  # Gate the release on the pushed commit. This mirrors ci.yml's checks — build,
  # vet, the full Go test suite, the race leg — plus the full behavioural eval
  # suite against a real Linux binary (the same steps as ci.yml's `evals-linux`
  # job). A red suite or a red eval here aborts before anything is built or
  # published.
  # Checked out at github.sha (the commit the pushed tag pointed at), NEVER the
  # default-branch tip or the re-resolvable tag name, so the gate exercises
  # exactly the commit whose binaries will ship.
  verify:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the pushed commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # github.sha, not the tag ref: checkout re-resolves a NAMED ref at each
          # job's start, so a tag moved after the push could differ here. The sha
          # is the commit the pushed tag pointed at, immutable for this run.
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.25'
          # cache: false — this workflow is tag-triggered; module caching in a
          # release-triggering workflow is a cache-poisoning vector (zizmor).
          cache: false

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Test (race, internal)
        run: go test -race ./internal/...

      - name: Install strace (enables the AC-ssh-not-read strict leg on Linux)
        run: sudo apt-get update && sudo apt-get install -y strace

      - name: Build the Linux ferry binary
        run: go build -o "$RUNNER_TEMP/ferry" .

      # FERRY_CONFORMANCE=1 makes a missing install.sh a FAILURE (not a skip) for
      # the offline installer ACs, matching the final-conformance contract in
      # evals/README.
      - name: Run the full eval suite against the Linux binary
        run: FERRY_BIN="$RUNNER_TEMP/ferry" FERRY_INSTALL_SH="$PWD/install.sh" FERRY_CONFORMANCE=1 go test ./evals/...

      # Independent, gating cross-check of the "never reads ~/.ssh" promise: run a
      # non-doctor ferry command under strace and FAIL if it performs any
      # open/openat under ~/.ssh/. A second, script-level tripwire alongside the
      # in-Go strace leg above — a real syscall assertion, not a proxy.
      - name: strace tripwire — no ~/.ssh opens (AC-ssh-not-read)
        run: |
          set -euo pipefail
          SBOX="$RUNNER_TEMP/ssh-not-read-sandbox"
          mkdir -p "$SBOX/.ssh" "$SBOX/.config/ferry" "$SBOX/.local/state/ferry" "$SBOX/repo"
          # Seed a sentinel private key ferry must never open.
          printf -- '-----BEGIN OPENSSH PRIVATE KEY-----\nSENTINELKEYMATERIAL\n-----END OPENSSH PRIVATE KEY-----\n' > "$SBOX/.ssh/id_ed25519"
          chmod 600 "$SBOX/.ssh/id_ed25519"
          # Minimal repo + machine config so a non-doctor command has scope to read.
          printf '[manage]\ndotfiles = [".zshrc"]\n' > "$SBOX/repo/ferry.toml"
          printf 'repo = "%s"\n' "$SBOX/repo" > "$SBOX/.config/ferry/config.toml"
          TRACE="$RUNNER_TEMP/ssh-not-read.strace"
          # -f follows a git subprocess too; status is a read-only non-doctor command.
          # ferry's own exit status is irrelevant here (|| true); the trace is the check.
          HOME="$SBOX" strace -f -e trace=open,openat -o "$TRACE" "$RUNNER_TEMP/ferry" status </dev/null || true
          # Harden against a silent no-op: if strace produced no trace at all (not
          # installed, crashed), the grep below would find nothing and pass falsely.
          # Require a non-empty trace so this tripwire can never green on a broken run.
          if [ ! -s "$TRACE" ]; then
            echo "AC-ssh-not-read: strace produced no trace — cannot verify; failing closed" >&2
            exit 1
          fi
          # FAIL if any open/openat line names a path under the sandbox ~/.ssh/.
          if grep -E 'open(at)?\(' "$TRACE" | grep -F "$SBOX/.ssh" ; then
            echo "AC-ssh-not-read: ferry opened a path under ~/.ssh/ (must never read it)" >&2
            exit 1
          fi
          echo "AC-ssh-not-read: no ~/.ssh opens observed under strace (status)."

  # Build and publish ONLY after verify is green. Binaries are cross-compiled
  # from the same pushed commit (github.sha) that verify just gated, so the
  # shipped artefacts match the code that passed — even if the tag has been
  # re-pointed since verify started.
  release:
    needs: verify
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the Release and upload its assets (no branch push)
      id-token: write       # mint the OIDC token attest-build-provenance signs with
      attestations: write   # publish the build-provenance attestations (and let the
                            # post-release verify step read them back through gh)
    steps:
      - name: Check out the pushed commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # github.sha (the commit the pushed tag pointed at), not the tag NAME
          # and not the default-branch tip, so the binaries below are built from
          # the exact commit verify gated — a tag re-pointed mid-run changes
          # nothing here.
          ref: ${{ github.sha }}
          # No job step pushes to any branch, so no git-stored credentials are
          # needed: gh uses GH_TOKEN and the ls-remote tripwire reads public refs.
          persist-credentials: false

      - name: Record the default-branch tip (no-branch-commit tripwire)
        # This release job must push NOTHING to any branch. Record the remote
        # default-branch tip now; the closing step re-reads it and fails the run
        # if the branch moved BECAUSE OF THIS JOB. Anonymous ls-remote works
        # because this repo is public; if it ever goes private, switch to
        # `gh api repos/.../git/ref/heads/...` with GH_TOKEN.
        run: |
          set -euo pipefail
          sha="$(git ls-remote origin "refs/heads/${DEFAULT_BRANCH}" | cut -f1)"
          test -n "$sha"
          echo "DEFAULT_BRANCH_START_SHA=$sha" >> "$GITHUB_ENV"
          echo "default-branch tip at job start: $sha"
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.25'
          cache: false

      - name: Cross-compile the four binaries (version-stamped from the tag)
        # VERSION=<tag> stamps `ferry --version` via -ldflags. The binaries built
        # here are the ones checksummed, attested, and uploaded below, so the
        # manifest, the published assets, and the reported version are all in sync.
        run: make build VERSION="${GITHUB_REF_NAME}"

      - name: Generate checksums.txt over the four binaries
        # Hash the exact binaries built above into a sha256sum-format manifest.
        # It is uploaded as a release asset; install.sh fetches it from the release
        # and verifies each download against it. No rebuild — the bytes hashed here
        # are the bytes uploaded below.
        run: scripts/gen-checksums.sh

      - name: Attest build provenance for the binaries and checksums.txt
        # Signed SLSA build-provenance for each cross-compiled binary AND the
        # checksums.txt manifest, over the exact files uploaded below. Runs BEFORE
        # the Release so a failed attestation aborts before anything is published.
        # install.sh does not consume these attestations (it verifies the binary
        # against checksums.txt); attesting checksums.txt makes the manifest a
        # first-class, provenance-signed artifact for anyone who verifies it with
        # `gh attestation verify`. Needs id-token: write (OIDC) and
        # attestations: write (the attestations store) from the job permissions.
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            bin/ferry-*
            bin/checksums.txt

      - name: Create the GitHub Release and upload the binaries + checksums.txt
        run: gh release create "${GITHUB_REF_NAME}" bin/ferry-* bin/checksums.txt --verify-tag --title "${GITHUB_REF_NAME}" --notes ""
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify the published attestation against a freshly downloaded binary
        # Post-release gate (plan W2 eval): prove the attestation is real and
        # retrievable. Download one binary FRESH from the just-created Release and run
        # `gh attestation verify` against this repo; a failure fails the whole run. gh
        # reads the release asset (contents: read, covered by contents: write) and the
        # attestation (attestations read, covered by attestations: write). Runs before
        # the prune so the release it verifies is guaranteed still present.
        run: |
          set -euo pipefail
          DL="$RUNNER_TEMP/attest-verify"
          mkdir -p "$DL"
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern 'ferry-linux-amd64' \
            --dir "$DL"
          # --signer-workflow binds acceptance to an attestation SIGNED BY this
          # release workflow, not merely one from somewhere in this repo (--repo
          # alone accepts any workflow's attestation). Format is
          # [host/]<owner>/<repo>/<path>/<to>/<workflow>; GITHUB_REPOSITORY is
          # <owner>/<repo>.
          gh attestation verify "$DL/ferry-linux-amd64" \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release.yml"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prune superseded releases (retention policy)
        # Runs ONLY after the new release is published (a failed publish stops the job
        # before this step). Keeps the latest release of the current line plus the last
        # release of every other line, deleting older within-line RELEASES (never their
        # git tags, which are immutable once pushed). It never prunes the release just
        # created (--current), and refuses if a newer
        # patch than the current one somehow exists. See scripts/prune-releases.sh.
        run: scripts/prune-releases.sh --current "${GITHUB_REF_NAME}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Assert the release job pushed nothing to the default branch
        # Close the no-branch-commit tripwire opened at job start. Runs last so it
        # covers every preceding step, including the release create and prune.
        # !cancelled(): the tripwire must still run when an earlier step FAILED —
        # an abnormal run is exactly when an unexpected push most needs catching
        # (the default if: success() would silently skip it). Not always(), which
        # would also run on a cancelled job whose half-finished state proves
        # nothing.
        # If the tip is unchanged, done. If it moved, attribute: a push from this job
        # would use the GITHUB_TOKEN and land as github-actions[bot], so a bot
        # commit in the moved range fails the run, while an unrelated concurrent
        # human merge is logged and tolerated (this job did not cause it).
        # Honest scope: this proves no bot-identity commit reached the default
        # branch during the job; a future step that pushed under some other
        # explicitly-wired identity would be misattributed as external — but such
        # a step would also have to add credentials this job no longer has
        # (persist-credentials: false), which code review gates. If the range
        # lookup itself fails (e.g. the branch was force-pushed mid-run), set -e
        # fails the run — fail closed.
        if: ${{ !cancelled() }}
        run: |
          set -euo pipefail
          end="$(git ls-remote origin "refs/heads/${DEFAULT_BRANCH}" | cut -f1)"
          if [ "$end" = "${DEFAULT_BRANCH_START_SHA}" ]; then
            echo "default branch unchanged across the release job (${end}); the job pushed nothing."
            exit 0
          fi
          committers="$(gh api "repos/${GITHUB_REPOSITORY}/compare/${DEFAULT_BRANCH_START_SHA}...${end}" \
            --jq '[.commits[].committer.login // "unknown"] | unique | join(" ")')"
          echo "default branch moved during the release job: ${DEFAULT_BRANCH_START_SHA} -> ${end} (committers: ${committers})"
          case " ${committers} " in
            *" github-actions[bot] "*)
              echo "a github-actions[bot] commit landed on the default branch during this job — the release workflow must never push to a branch" >&2
              exit 1
              ;;
          esac
          echo "movement attributed to commits outside this job; the release job itself pushed nothing."
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
