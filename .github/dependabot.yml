# Dependency updates with a supply-chain cooldown: new releases must age
# before a PR is opened (bot-automerge of fresh malicious releases is the
# documented attack); security advisories bypass the cooldown.
version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 5
    groups:
      go-deps:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 5
